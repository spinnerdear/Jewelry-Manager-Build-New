     name: Build Windows EXE
     on: [push, workflow_dispatch]
     jobs:
       build:
         runs-on: windows-latest
         steps:
           - uses: actions/checkout@v3
           - uses: actions/setup-python@v4
             with:
               python-version: '3.10'
           - name: Install dependencies
             run: |
               pip install pyinstaller pillow google-generativeai rembg opencv-python numpy onnxruntime
           - name: Build EXE
             run: |
               pyinstaller --onefile --noconsole --collect-all pymatting --collect-all rembg jewelry_manager.py
           - name: Upload Artifact
             uses: actions/upload-artifact@v4
             with:
               name: JewelryManager-EXE
               path: dist/jewelry_manager.exe
