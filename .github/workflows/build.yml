 1 name: Build Windows EXE
    2 on: [push, workflow_dispatch]
    3 jobs:
    4   build:
    5     runs-on: windows-latest
    6     steps:
    7       - uses: actions/checkout@v3
    8       - uses: actions/setup-python@v4
    9         with:
   10           python-version: '3.10'
   11       - run: pip install pillow pyinstaller
   12       - run: pyinstaller --onefile --noconsole jewelry_manager.py
   13       - uses: actions/upload-artifact@v3
   14         with:
   15           name: JewelryManager-EXE
   16           path: dist/jewelry_manager.exe
