name: Build PixUp Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # ต้องมีเพื่อสร้าง GitHub Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'                # cache pip ตาม requirements.txt → build รอบถัด ๆ เร็วขึ้น

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract Version from Code
        id: get_version
        shell: bash
        run: |
          # ดึงเลขเวอร์ชันจากบรรทัด self.version = "..."
          VERSION=$(grep -oP 'self\.version\s*=\s*"\K[^"]+' pixup.py)
          CLEAN_VERSION=$(echo $VERSION | sed 's/ /_/g')
          echo "VERSION=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "RAW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $CLEAN_VERSION"

      - name: Build EXE with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --noconsole \
            --icon app_icon.ico \
            --add-data "logo.png;." \
            --name "PixUp_v${{ steps.get_version.outputs.VERSION }}" pixup.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixUp_v${{ steps.get_version.outputs.VERSION }}-EXE
          path: dist/PixUp_v${{ steps.get_version.outputs.VERSION }}.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-${{ github.run_number }}
          name: PixUp ${{ steps.get_version.outputs.RAW_VERSION }} (build ${{ github.run_number }})
          body: |
            PixUp ${{ steps.get_version.outputs.RAW_VERSION }} — build อัตโนมัติจาก commit ${{ github.sha }}
            ดาวน์โหลด `PixUp_v${{ steps.get_version.outputs.VERSION }}.exe` ด้านล่างไปใช้บน Windows
          files: dist/PixUp_v${{ steps.get_version.outputs.VERSION }}.exe
          draft: false
          prerelease: false
